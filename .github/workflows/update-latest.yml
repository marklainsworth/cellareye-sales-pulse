name: Mirror latest brief

on:
  push:
    branches: [main]
    paths:
      - 'briefs/2*.html'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find the newest dated brief
        id: find_latest
        run: |
          newest=$(ls -1 briefs/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}\.html$' | sort | tail -1)
          if [ -z "$newest" ]; then
            echo "No dated brief files found, skipping."
            exit 0
          fi
          echo "newest_file=$newest" >> "$GITHUB_OUTPUT"
          echo "Newest brief: $newest"

      - name: Copy newest brief to latest.html
        if: steps.find_latest.outputs.newest_file != ''
        run: |
          cp "briefs/${{ steps.find_latest.outputs.newest_file }}" briefs/latest.html
          echo "Copied briefs/${{ steps.find_latest.outputs.newest_file }} -> briefs/latest.html"

      - name: Commit and push if changed
        if: steps.find_latest.outputs.newest_file != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add briefs/latest.html
          if git diff --cached --quiet; then
            echo "latest.html already up to date, nothing to commit."
          else
            git commit -m "Mirror ${{ steps.find_latest.outputs.newest_file }} to latest.html"
            git push
          fi
